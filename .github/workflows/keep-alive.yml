name: Keep Supabase Alive
on:
  schedule:
    # Run every 3 days at 6:00 AM UTC to prevent Supabase free tier auto-pause
    - cron: '0 6 */3 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase PostgreSQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pip install asyncpg
          python -c "
          import asyncio, asyncpg, os
          async def ping():
              conn = await asyncpg.connect(os.environ['DATABASE_URL'])
              v = await conn.fetchval('SELECT NOW()')
              print(f'Supabase alive: {v}')
              n = await conn.fetchval('SELECT COUNT(*) FROM neurons')
              print(f'Neurons: {n}')
              await conn.close()
          asyncio.run(ping())
          "
